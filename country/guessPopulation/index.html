<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../../data/globe-showing-europe-africa-noto-emoji-noanimation.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Display&display=swap" rel="stylesheet">
    <script src="./main.js" defer type="module"></script>
    <title>Metrop games</title>
</head>
<body>
    <div id="chooseSimple"></div>
    <div id="choose"></div>
    <div id="game">
        <div id="a">
<img id="imgA" src="https://upload.wikimedia.org/wikipedia/commons/b/b3/Flag_of_Vatican_City_%282023%E2%80%93present%29.svg">
<br>            
<h1 id="TA">Vatican</h1>
<div id="1c" class="counter" data-target="496">0</div>
        </div>
        <div id="b">
<img id="imgB" src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg">
<br>            
<h1 id="TB">Inde</h1>
<div id="2c" class="counter" data-target="1470000000">0</div>
        </div>
        <div id="c">
            <h2>Metrop</h2>
            <p>Vous devez trouver quel pays a la plus grande population !</p>
            <p>(clicker sur le pays de votre choix)</p>
            <h1 id="score">0</h1>
            <p id="scoremsg">Score</p>
            <p></p>
            <button class="btn" id="cont" disabled>Continuer</button>
            <p></p>
            <button id="quit" class="btn" onclick="window.location.href = '../../'">Quiter</button>
        </div>
    </div>
</body>
</html>
